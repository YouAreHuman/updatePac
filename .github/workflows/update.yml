name: Auto Update Nodes

on:
  push:
    branches:
      - master
  # 1. 定时触发：每天从 00:00 UTC 开始，每 4 小时运行一次
  # 对应 UTC 时间: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00
  # 注意：GitHub Actions 使用 UTC 时间。如果你需要北京时间 (UTC+8)，请自行换算。
  # 下面是 UTC 时间的每4小时：
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'
  
  # 允许手动触发测试
  workflow_dispatch:

jobs:
  update-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # 2. 下载当前仓库代码 (必须步骤，否则无法操作文件)
      - name: Checkout current repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 获取完整历史，方便对比（虽然这里主要看文件内容）

      # 3. 下载 GitHub 上另外一个 node 项目
      # 假设外部项目地址是 https://github.com/USER/REPO_NAME
      # 我们将其克隆到子目录 'cfw'
      - name: Clone external Node project
        run: |
          git clone --depth 1 https://github.com/lsq/cfw_config.git cfw

      # 4. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24 # 根据你的项目需求调整版本
          # cache: 'npm'
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      # 5. 安装 pnpm
      # - name: Install pnpm
        # uses: pnpm/action-setup@v4
        # with:
          # version: 10 # 或者使用 'latest'
          # cache: true

      # 6. 在外部项目中安装依赖
      - name: Install dependencies from cfw
        run: |
          cd cfw
          pnpm install --frozen-lockfile || pnpm install

      # 7. 执行上面写好的代码
      # 假设你的入口脚本在 cfw 的根目录，或者你需要指定路径
      # 这里假设你的脚本是 cfw/index.js 或者 cfw 下有 package.json script
      - name: Run update script
        id: run_script
        run: |
          cd cfw
          # 方式 A: 如果 package.json 里有 "start": "node index.js"
          # pnpm start 
          
          # 方式 B: 直接运行你的入口文件 (根据你之前的代码逻辑调整)
          # 假设你的主文件叫 index.js 或 update.js
          node getPac.js 
          
          # 检查生成的文件是否存在
          if [ ! -f "newpac.yaml" ]; then
            echo "❌ 错误: 脚本执行成功但未生成 newpac.yaml"
            exit 1
          fi
          echo "✅ 脚本执行完成，newpac.yaml 已生成"

      # 8. 比较文件并自动 Push
      - name: Check changes and Push
        run: |
          # 配置 Git 用户信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 将生成的新文件从 cfw 复制回仓库根目录 (或者你希望存放的位置)
          # 假设你要覆盖根目录下的 newpac.yaml
          cp cfw/newpac.yaml ./newpac.yaml
          # 方法：检查 git status 是否有输出。
          # git status --porcelain 会列出所有变更（包括新文件 M, A, D 等）。
          # 如果没有任何输出，说明真的没变化。
          # 如果有输出（例如 ?? newpac.yaml 表示新文件），说明有变化。
          # 初始化标记变量
          HAS_CHANGES=false

          # --- 第一步：检查已跟踪文件的内容差异 ---
          # 如果文件已存在且被修改，git diff 会返回非零 (有差异)
          # ! git diff --quiet 返回 true 表示有差异
          if ! git diff --quiet HEAD -- newpac.yaml; then
            echo "🔄 检测到 [内容修改]: newpac.yaml 内容已更新"
            HAS_CHANGES=true
          fi

          # --- 第二步：检查是否为新文件 (未跟踪) ---
          # 如果文件是新的 (Untracked)，git diff 上面那步会跳过，但这步能抓到
          # git status --porcelain 输出非空表示有状态变化 (如 ?? newpac.yaml)
          CHANGES_STATUS=$(git status --porcelain -- newpac.yaml)
          if [ -n "$CHANGES_STATUS" ]; then
            # 避免重复打印，如果是新文件，上面 diff 没抓到，这里才打印
            if [ "$HAS_CHANGES" = false ]; then
              echo "🔄 检测到 [新文件]: newpac.yaml 是新创建的"
            else
              # 如果上面已经打印了内容修改，这里可以补充说明，或者忽略
              echo "ℹ️ 同时检测到文件状态变化 (可能是新文件追踪或权限变动)"
            fi
            HAS_CHANGES=true
          fi

          # --- 第三步：根据标记执行操作 ---
          if [ "$HAS_CHANGES" = true ]; then
            echo "🚀 准备提交并推送..."
            
            git add newpac.yaml
            git commit -m "chore: auto update nodes $(date '+%Y-%m-%d %H:%M:%S') UTC"
            
            # 推送到当前分支
            git push origin HEAD:master
            
            echo "✅ 推送成功！"
          else
            echo "⏭️ 无任何变化 (文件未修改且不是新文件)，跳过提交。"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
